# Installed as /etc/systemd/system/getty@tty1.service.d/override.conf
# Enables passwordless autologin on tty1 so the machine boots straight
# into the ForgeOS shell session with no login screen.
#
# Replace FORGEOS_USER with the target account created during image build.

[Service]
ExecStart=
ExecStart=-/sbin/agetty --autologin FORGEOS_USER --noclear %I $TERM
